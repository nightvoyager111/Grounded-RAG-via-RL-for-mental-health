# DPO knobs (CLAUDE.md Act 1). Two stages, one config:
#   - Pair construction: local, cheap, API-bound (judge calls).
#   - Training: GPU-bound, run on Colab / cloud.

# --- Pair construction (build_dpo_pairs.py) ---
questions_file: data/qa/baseline_questions.jsonl
pairs_out: data/dpo/pairs.jsonl
scored_out: data/dpo/scored_candidates.jsonl   # audit trail: every sample + score

samples_per_question: 4           # K candidates per Q on the *correct* passages
hard_negatives_per_question: 2    # extra samples on *swapped* passages (plausible-but-unsupported)
sample_temperature: 0.8           # need spread across the K samples
sample_top_p: 0.95

# Pair rules — CLAUDE.md warns rejected must be plausible-but-unsupported.
chosen_min_score: 0.75            # judge must agree the chosen is grounded
rejected_max_score: 0.5           # loosened from 0.25 — baseline rarely hallucinates,
                                  # so treat "partial support" as the negative class
min_pair_gap: 0.25                # loosened from 0.5 to match

# --- Training (train_dpo.py) ---
base_model: Qwen/Qwen2.5-1.5B-Instruct
output_dir: checkpoints/dpo
use_unsloth: true                 # falls back to plain TRL + PEFT if unavailable

# LoRA — attention + MLP so DPO can actually rewire how the model uses
# passages (attention only was too narrow — first run gave a null result).
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# DPO hyperparams — retuned after run #1 produced margins ≈ 0.
beta: 0.05                        # lower → looser KL constraint, more training freedom on small data
learning_rate: 2.0e-5             # was 5e-6, too low for LoRA on 20 pairs
num_train_epochs: 10              # was 5; 19 pairs × 10 / eff batch 8 ≈ 24 steps
per_device_train_batch_size: 2
gradient_accumulation_steps: 4    # was 8; halving to double optimizer step count
max_length: 1024                  # prompt + response; RAG prompts are long
max_prompt_length: 768
