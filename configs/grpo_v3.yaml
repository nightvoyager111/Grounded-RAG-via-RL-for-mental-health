questions_file: data/qa/expanded_questions.jsonl
prompts_out: data/grpo/prompts_v2.jsonl
base_model: Qwen/Qwen2.5-1.5B-Instruct
dpo_adapter: checkpoints/dpo
output_dir: checkpoints/grpo_v3
copy_penalty_lambda: 0.5
copy_ngram: 8
citation_bonus_mu: 0.3
citation_compliance_bonus_nu: 0.6
abstention_penalty_rho: 0.4
abstention_ignore_score: 0.5
judge_max_workers: 8
judge_model_name: command-r-08-2024
judge_temperature: 0.0
judge_api_key_env: COHERE_API_KEY
reward_trace: data/grpo/reward_trace_v3.jsonl
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
- q_proj
- k_proj
- v_proj
- o_proj
- gate_proj
- up_proj
- down_proj
num_generations: 4
per_device_train_batch_size: 4
gradient_accumulation_steps: 2
learning_rate: 2.0e-06
beta: 0.04
num_train_epochs: 2
max_prompt_length: 1536
max_completion_length: 256
temperature: 0.9
top_p: 0.95
save_strategy: steps
logging_steps: 1
save_steps: 25
